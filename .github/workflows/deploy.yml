name: Deploy to AWS Lambda (Docker/ECR)

on:
  push:
    branches:
      - main     # Deploy on pushes to main (including PR merges)
  workflow_dispatch: # Allow manual triggers from the GitHub Actions UI

# Define environment variables used throughout the workflow
env:
  AWS_REGION: us-east-1                  # Update to your preferred AWS region
  ECR_REPOSITORY: my-lambda-backend      # Must match the ECR repository name you created
  LAMBDA_FUNCTION_NAME: my-react-backend # Must match your Lambda Function name

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # We need permission to get an OIDC token to authenticate with AWS
    # This is the modern, secure way (no long-lived access keys!)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # IMPORTANT: If you want to use long-lived Access Keys instead of OIDC, 
      # replace this step with the standard aws-actions/configure-aws-credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Note: Set these as secrets in your GitHub repository
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Check if ECR repository exists, create it if it doesn't
          if ! aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Repository ${{ env.ECR_REPOSITORY }} not found. Creating..."
            aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }}
          else
            echo "Repository ${{ env.ECR_REPOSITORY }} already exists."
          fi

          # Build a docker container and push it to ECR
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          
          # We also tag it as 'latest' for convenience
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          
          # output the image URI to be used in the next step
          echo "image_uri=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create or Update AWS Lambda Function
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }} # MUST BE SET IN GITHUB SECRETS
        run: |
          # Check if the Lambda function already exists
          if ! aws lambda get-function --function-name ${{ env.LAMBDA_FUNCTION_NAME }} --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            echo "Lambda function ${{ env.LAMBDA_FUNCTION_NAME }} not found. Creating..."
            
            if [ -z "$LAMBDA_ROLE_ARN" ]; then
              echo "Error: LAMBDA_ROLE_ARN secret is missing. Cannot create new Lambda function without an Execution Role."
              exit 1
            fi

            aws lambda create-function \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role $LAMBDA_ROLE_ARN \
              --region ${{ env.AWS_REGION }} \
              --timeout 30 \
              --memory-size 128
              
            # Wait for creation to finalize
            aws lambda wait function-active-v2 --function-name ${{ env.LAMBDA_FUNCTION_NAME }} --region ${{ env.AWS_REGION }}
          else
            echo "Lambda function ${{ env.LAMBDA_FUNCTION_NAME }} exists. Updating code..."
            
            aws lambda update-function-code \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
              --image-uri $IMAGE_URI \
              --region ${{ env.AWS_REGION }}
              
            # Wait for the update to complete
            aws lambda wait function-updated \
              --function-name ${{ env.LAMBDA_FUNCTION_NAME }} --region ${{ env.AWS_REGION }}
          fi

